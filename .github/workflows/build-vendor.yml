# GitHub Actions workflow for Green3785/api-vendor
# 构建完整的 API vendor 依赖包（node_modules + libvirt 预编译）
#
# 使用 pnpm deploy --prod --legacy 从 workspace 中提取 api 包的
# 完整生产依赖，生成无 symlink 的 flat node_modules。
#
# 产出：node_modules-for-v{version}.tar.xz（GitHub Release asset）

name: Build Vendor Archive

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      api_version:
        description: 'API version (e.g. 4.30.0)'
        required: true
      libvirt_tag:
        description: 'Libvirt release tag (e.g. v2.2.1-custom.1)'
        required: true
        default: 'v2.2.1-custom.1'
      libvirt_filename:
        description: 'Libvirt asset filename (e.g. libvirt-v2.2.1-node-v127-linux-x64.tar.gz)'
        required: true
        default: 'libvirt-v2.2.1-node-v127-linux-x64.tar.gz'

env:
  NODE_VERSION: '22.18.0'
  PNPM_VERSION: '10.15.0'
  LIBVIRT_REPO: 'Green3785/libvirt'
  LIBVIRT_TAG: ${{ github.event.inputs.libvirt_tag || 'v2.2.1-custom.1' }}
  LIBVIRT_FILENAME: ${{ github.event.inputs.libvirt_filename || 'libvirt-v2.2.1-node-v127-linux-x64.tar.gz' }}

jobs:
  build-vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.api_version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_name=node_modules-for-v${VERSION}.tar.xz" >> "$GITHUB_OUTPUT"
          echo "Building vendor archive for API v${VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils

      # ── 核心步骤：pnpm install + deploy ──
      # 1. 先完整 install（含 workspace 内部依赖解析）
      # 2. 再用 pnpm deploy 将 api 包的生产依赖提取到独立目录
      - name: Install all dependencies
        run: pnpm install
        env:
          npm_config_ignore_scripts: true

      - name: Deploy API package (extract production deps)
        run: |
          pnpm deploy --filter @vectra/api --prod --legacy deploy_output
          echo "Deploy output contents:"
          ls deploy_output/
          echo "---"
          echo "node_modules package count: $(ls deploy_output/node_modules/ | wc -l)"

      # ── 验证关键包 ──
      - name: Verify key packages
        run: |
          cd deploy_output
          MISSING=0
          for pkg in "@vectra/shared" "@vectra/libvirt" "reflect-metadata" "rxjs" "fastify" "@nestjs/core" "nest-commander" "class-validator" "class-transformer" "casbin"; do
            if [ -d "node_modules/$pkg" ]; then
              echo "OK: $pkg"
            else
              echo "MISSING: $pkg"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "Some packages are missing!"
            echo "Available packages:"
            ls node_modules/ | head -50
            exit 1
          fi
          echo "All key packages verified."

      # ── 下载 libvirt 预编译二进制 ──
      - name: Download libvirt prebuilt binary
        run: |
          LIBVIRT_DIR="deploy_output/node_modules/@vectra/libvirt/build/Release"
          mkdir -p "$LIBVIRT_DIR"

          DOWNLOAD_URL="https://github.com/${{ env.LIBVIRT_REPO }}/releases/download/${{ env.LIBVIRT_TAG }}/${{ env.LIBVIRT_FILENAME }}"
          echo "Downloading libvirt from: $DOWNLOAD_URL"
          curl -fSL "$DOWNLOAD_URL" -o /tmp/libvirt-prebuilt.tar.gz
          tar -xzf /tmp/libvirt-prebuilt.tar.gz -C "deploy_output/node_modules/@vectra/libvirt/"
          rm /tmp/libvirt-prebuilt.tar.gz

          if [ ! -f "$LIBVIRT_DIR/libvirt.node" ]; then
            echo "Error: libvirt.node not found after extraction"
            exit 1
          fi
          ls -la "$LIBVIRT_DIR/libvirt.node"
          echo "libvirt.node installed successfully"

      # ── 清理非必要文件 ──
      - name: Clean unnecessary files
        run: |
          cd deploy_output/node_modules

          find . -type d -name "__tests__" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "test" -not -path "*/node_modules/test" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".github" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.ts" -not -name "*.d.ts" -delete 2>/dev/null || true
          find . -type f -name "*.map" -delete 2>/dev/null || true
          find . -type f -name "*.md" -not -name "LICENSE*" -delete 2>/dev/null || true
          find . -type f -name "CHANGELOG*" -delete 2>/dev/null || true
          find . -type f -name ".eslint*" -delete 2>/dev/null || true
          find . -type f -name ".prettier*" -delete 2>/dev/null || true
          find . -type f -name "tsconfig*.json" -delete 2>/dev/null || true

          echo "Cleanup complete"
          du -sh .

      # ── 打包 ──
      # 只打包 node_modules 目录，部署时解压到 /usr/local/vectra-api/
      - name: Create vendor archive
        run: |
          ARCHIVE="${{ steps.version.outputs.archive_name }}"
          cd deploy_output
          XZ_OPT='-5 -T0' tar -cJf "../${ARCHIVE}" node_modules
          cd ..
          ls -lh "$ARCHIVE"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      # ── 创建 Release ──
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.version) || github.ref_name }}
          name: "Vendor Archive v${{ steps.version.outputs.version }}"
          body: |
            ## Vendor Dependencies for Vectra API v${{ steps.version.outputs.version }}

            **Node.js**: ${{ env.NODE_VERSION }} (ABI 127)
            **Platform**: linux-x64
            **libvirt**: ${{ env.LIBVIRT_TAG }}

            ### 包含内容
            - 所有运行时 npm 依赖（production only, flat, no symlinks）
            - `@vectra/shared` workspace 包
            - `@vectra/libvirt` 预编译 native addon（node-v127-linux-x64）
            - 已清理测试/文档/sourcemap 等非必要文件

            ### 使用方式
            ```bash
            tar -xJf ${{ steps.version.outputs.archive_name }} -C /usr/local/vectra-api/
            ```
          files: |
            ${{ steps.version.outputs.archive_name }}
            ${{ steps.version.outputs.archive_name }}.sha256
          draft: false
          prerelease: false
